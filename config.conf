# =============================================================================
# config.conf — Configuration centralisée Proxmox Admin
# =============================================================================
# Copiez ce fichier et adaptez-le à votre infrastructure.
# Toutes les variables ici peuvent être surchargées par des variables
# d'environnement du même nom (ex: export PVE_NODE=mynode).

# -----------------------------------------------------------------------------
# Nœud Proxmox cible
# -----------------------------------------------------------------------------
PVE_NODE="${PVE_NODE:-pve}"                   # Nom du nœud Proxmox
PVE_HOST="${PVE_HOST:-192.168.1.10}"          # IP ou hostname du nœud
PVE_PORT="${PVE_PORT:-8006}"                  # Port de l'API REST (si utilisé)

# -----------------------------------------------------------------------------
# Stockage par défaut
# -----------------------------------------------------------------------------
DEFAULT_STORAGE="${DEFAULT_STORAGE:-local-lvm}"     # Stockage VM/LXC
ISO_STORAGE="${ISO_STORAGE:-local}"                 # Stockage des ISOs
BACKUP_STORAGE="${BACKUP_STORAGE:-local}"           # Stockage des backups
TEMPLATE_STORAGE="${TEMPLATE_STORAGE:-local}"       # Stockage des templates LXC

# -----------------------------------------------------------------------------
# Réseau par défaut
# -----------------------------------------------------------------------------
DEFAULT_BRIDGE="${DEFAULT_BRIDGE:-vmbr0}"           # Bridge réseau
DEFAULT_VLAN="${DEFAULT_VLAN:-}"                    # VLAN tag (vide = aucun)
DEFAULT_GATEWAY="${DEFAULT_GATEWAY:-192.168.1.1}"   # Passerelle par défaut
DEFAULT_DNS="${DEFAULT_DNS:-8.8.8.8,8.8.4.4}"       # Serveurs DNS (virgule)
DEFAULT_SEARCH_DOMAIN="${DEFAULT_SEARCH_DOMAIN:-local.lan}"

# -----------------------------------------------------------------------------
# Valeurs par défaut VM
# -----------------------------------------------------------------------------
VM_DEFAULT_CPU="${VM_DEFAULT_CPU:-2}"               # Nombre de vCPU
VM_DEFAULT_RAM="${VM_DEFAULT_RAM:-2048}"            # RAM en Mo
VM_DEFAULT_DISK="${VM_DEFAULT_DISK:-20}"            # Disque en Go
VM_DEFAULT_BIOS="${VM_DEFAULT_BIOS:-seabios}"       # seabios | ovmf (UEFI)
VM_DEFAULT_MACHINE="${VM_DEFAULT_MACHINE:-q35}"     # Type de machine
VM_DEFAULT_OSTYPE="${VM_DEFAULT_OSTYPE:-l26}"       # l26 (Linux), win10, etc.
VM_DEFAULT_CPU_TYPE="${VM_DEFAULT_CPU_TYPE:-host}"  # Type de CPU

# -----------------------------------------------------------------------------
# Valeurs par défaut LXC
# -----------------------------------------------------------------------------
LXC_DEFAULT_CPU="${LXC_DEFAULT_CPU:-1}"             # Nombre de vCPU
LXC_DEFAULT_RAM="${LXC_DEFAULT_RAM:-512}"           # RAM en Mo
LXC_DEFAULT_SWAP="${LXC_DEFAULT_SWAP:-512}"         # SWAP en Mo
LXC_DEFAULT_DISK="${LXC_DEFAULT_DISK:-8}"           # Disque en Go
LXC_DEFAULT_UNPRIVILEGED="${LXC_DEFAULT_UNPRIVILEGED:-1}"  # 1=non privilégié

# -----------------------------------------------------------------------------
# Plage d'IDs VMID automatique
# -----------------------------------------------------------------------------
VMID_MIN="${VMID_MIN:-100}"       # VMID minimum automatique
VMID_MAX="${VMID_MAX:-9999}"      # VMID maximum automatique

# -----------------------------------------------------------------------------
# Cloud-Init
# -----------------------------------------------------------------------------
CI_DEFAULT_USER="${CI_DEFAULT_USER:-debian}"
CI_DEFAULT_SSH_KEY="${CI_DEFAULT_SSH_KEY:-$HOME/.ssh/id_rsa.pub}"
CI_UPGRADE="${CI_UPGRADE:-1}"                       # 1 = apt upgrade au boot

# -----------------------------------------------------------------------------
# Chemins & logs
# -----------------------------------------------------------------------------
LOG_DIR="${LOG_DIR:-/var/log/proxmox-admin}"
LOG_FILE="${LOG_FILE:-$LOG_DIR/proxmox-admin.log}"
LOG_LEVEL="${LOG_LEVEL:-INFO}"    # DEBUG | INFO | WARN | ERROR

# -----------------------------------------------------------------------------
# Comportement
# -----------------------------------------------------------------------------
FORCE_COLOR="${FORCE_COLOR:-1}"          # 1 = forcer les couleurs ANSI
CONFIRM_DESTRUCTIVE="${CONFIRM_DESTRUCTIVE:-1}"  # 1 = demander confirmation
TIMEOUT_START="${TIMEOUT_START:-120}"    # Timeout démarrage (secondes)
TIMEOUT_STOP="${TIMEOUT_STOP:-60}"       # Timeout arrêt propre (secondes)
